name: Daily Etimad Cyber Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0-4"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python src/etimad_agent.py
        env:
          TENDERS_API_KEY: ${{ secrets.TENDERS_API_KEY }}
          TENDERS_API_URL: ${{ vars.TENDERS_API_URL }}

      - run: |
          git config user.name etimad-opportunity-bot
          git config user.email actions@users.noreply.github.com
          git add output/
          git diff --cached --quiet || (git commit -m "Update Etimad cyber opportunities" && git push)
